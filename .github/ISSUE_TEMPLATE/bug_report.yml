name: Bug report
description: Report a reproducible Krystal Quorum bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Krystal Quorum.
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `krystal-quorum --version` if available, or the package version.
      placeholder: "0.5.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include the command, plan shape, reviewer config, and sanitized output.
      placeholder: "krystal-quorum review examples/bad-plan.md --reviewers mock"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, reviewer backend, and install method.
